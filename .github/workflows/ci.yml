name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Static syntax check
        run: |
          git ls-files '*.js' | xargs -r -n 1 node --check

      - name: Run layout tests
        run: node --test test/layoutVerification.test.js

      - name: Run workflow tests
        run: node --test test/workflowSessionService.test.js
